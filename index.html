<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px;}
.container{width:100%;max-width:520px;text-align:center;}

.links{display:flex;flex-direction:column;gap:15px;}
.link{display:block;background:#fff;color:#000;text-decoration:none;padding:18px;border-radius:14px;font-weight:600;letter-spacing:1px;transition:all .25s ease;}
.link:hover{transform:translateY(-4px);background:#dcdcdc;}
.instagram-link{display:flex;justify-content:center;align-items:center;width:60px;height:60px;margin:25px auto 0;background:transparent;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);border-radius:50%;transition:all .25s ease;}
.instagram-link:hover{background:#fff;color:#000;transform:translateY(-3px);}
.footer{margin-top:30px;color:#666;font-size:.8rem;letter-spacing:2px;}
